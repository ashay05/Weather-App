<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="weather-panel" aria-label="Weather dashboard">
        <header class="topbar">
          <div>
            <p class="eyebrow">Live forecast</p>
            <h1>Weather</h1>
          </div>
          <button class="icon-button" id="locationButton" type="button" aria-label="Use current location" title="Use current location">
            <span aria-hidden="true">GPS</span>
          </button>
        </header>

        <form class="search" id="searchForm">
          <label class="sr-only" for="cityInput">Search city</label>
          <input id="cityInput" name="city" type="search" placeholder="Search city or place" autocomplete="off" />
          <button type="submit">Search</button>
        </form>

        <p class="status" id="status" role="status" aria-live="polite"></p>

        <figure class="city-photo-frame" id="cityPhotoFrame" hidden>
          <img id="cityPhoto" src="" alt="" />
          <figcaption id="cityPhotoCaption"></figcaption>
        </figure>

        <section class="current" id="currentWeather" hidden>
          <div class="current-main">
            <div>
              <button class="place" id="placeName" type="button" title="Show famous place"></button>
              <p class="date" id="dateText"></p>
            </div>
            <div class="weather-icon" id="weatherIcon" aria-hidden="true"></div>
          </div>

          <div class="temperature-row">
            <p class="temperature"><span id="temperature"></span><sup>&deg;C</sup></p>
            <div>
              <p class="condition" id="condition"></p>
              <p class="feels">Feels like <span id="feelsLike"></span>&deg;C</p>
            </div>
          </div>

          <div class="metrics" aria-label="Current weather details">
            <article>
              <span>Wind</span>
              <strong><span id="wind"></span> km/h</strong>
            </article>
            <article>
              <span>Humidity</span>
              <strong><span id="humidity"></span>%</strong>
            </article>
            <article>
              <span>Rain</span>
              <strong><span id="rainChance"></span>%</strong>
            </article>
          </div>
        </section>

        <section class="forecast" id="forecast" hidden>
          <div class="section-heading">
            <h2 id="forecastTitle">Forecast</h2>
            <span id="updatedAt"></span>
          </div>
          <div class="forecast-list" id="forecastList"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
